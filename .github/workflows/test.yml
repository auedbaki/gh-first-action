name: Test Project
on:
    push: 
        branches:
            - 'main'
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Get Code
              uses: actions/checkout@v6
            - name: Setup NodeJS
              uses: actions/setup-node@v6
              with:
                node-version: 18
            - name: Install Dependencies
              run: npm ci
            - name: Run Test
              run: npm run test
    